<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Watches">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Watches</title>
  <style>
    :root {
      --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --border:#2a2a2a;
      --gold:#c9a84c; --gold2:#e8c97a; --text:#f0f0f0; --text2:#888;
      --green:#4ade80; --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
      --orange:#fb923c; --teal:#2dd4bf;
      --nav-h:68px; --safe-bot:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
    header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px 10px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:19px;font-weight:700;letter-spacing:1.5px;color:var(--gold)}
    #header-sub{font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}
    #sync-status{font-size:11px;color:var(--text2)}
    main{padding:16px 14px;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 20px);max-width:600px;margin:0 auto}
    .view{display:none;animation:fadeIn .18s ease}
    .view.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(12,12,12,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot)}
    nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text2);transition:color .15s;font-size:10px;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
    nav button.active{color:var(--gold)}
    nav button svg{width:21px;height:21px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
    .card-sm{padding:12px}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
    .stat .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
    .stat .val{font-size:21px;font-weight:700;color:var(--gold2)}
    .stat .sub{font-size:11px;color:var(--text2);margin-top:2px}
    .sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;margin-top:2px}
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px}
    .b-green{background:rgba(74,222,128,.15);color:var(--green)}
    .b-gold{background:rgba(201,168,76,.15);color:var(--gold2)}
    .b-blue{background:rgba(96,165,250,.15);color:var(--blue)}
    .b-red{background:rgba(248,113,113,.15);color:var(--red)}
    .b-purple{background:rgba(192,132,252,.15);color:var(--purple)}
    .b-orange{background:rgba(251,146,60,.18);color:var(--orange)}
    .b-teal{background:rgba(45,212,191,.15);color:var(--teal)}
    .watch-card.card-forwarded{border-left:4px solid var(--teal)}
    .watch-card.card-devuelto{border-left:4px solid var(--orange) !important;opacity:.9}
    .c-carlos{background:rgba(96,165,250,.18);color:var(--blue);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
    .c-marta{background:rgba(192,132,252,.18);color:var(--purple);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
    .watch-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;border-left:4px solid var(--border)}
    .watch-card:active{border-color:var(--gold)}
    .watch-card.card-carlos{border-left:4px solid var(--blue)}
    .watch-card.card-marta{border-left:4px solid var(--purple)}
    .watch-card .model{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.3}
    .watch-card .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .watch-card .price{font-size:17px;font-weight:700;color:var(--gold2)}
    .watch-card .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--text2)}
    .cuenta-label{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px}
    .cuenta-carlos{background:rgba(96,165,250,.2);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
    .cuenta-marta{background:rgba(192,132,252,.2);color:var(--purple);border:1px solid rgba(192,132,252,.3)}
    .p-pos{color:var(--green);font-weight:700}
    .p-neg{color:var(--red);font-weight:700}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;outline:none;transition:border-color .15s;-webkit-appearance:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
    .form-group select option{background:var(--bg3)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;-webkit-appearance:none}
    .btn:active{opacity:.7}
    .btn-gold{background:var(--gold);color:#000}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .btn-green{background:rgba(74,222,128,.2);color:var(--green);border:1px solid rgba(74,222,128,.3)}
    .btn-red{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .btn-orange{background:rgba(251,146,60,.2);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
    .btn-sm{width:auto;padding:7px 16px;font-size:13px;border-radius:9px}
    .btn-blue{background:rgba(96,165,250,.2);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
    .socio-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px}
    .socio-card .name{font-size:16px;font-weight:700;margin-bottom:10px}
    .sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
    .sum-row:last-child{border-bottom:none}
    .sum-row .k{font-size:12px;color:var(--text2)}
    .sum-row .v{font-size:13px;font-weight:700}
    .progress-bar{height:5px;background:var(--bg3);border-radius:3px;margin-top:10px}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s}
    .loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:36px 16px;color:var(--text2)}
    .empty .icon{font-size:36px;margin-bottom:8px}
    .divider{height:1px;background:var(--border);margin:12px 0}
    #toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 14px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
    #toast.show{opacity:1}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal h2{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--gold2)}
    .modal-close{float:right;background:var(--bg3);border:none;color:var(--text2);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px}
    .filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
    .filter-tabs::-webkit-scrollbar{display:none}
    .ftab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .ftab.active{background:var(--gold);border-color:var(--gold);color:#000}
    .search-wrap{position:relative;margin-bottom:12px}
    .search-wrap input{padding-left:38px}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2)}
    .sell-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;border-left:3px solid var(--border)}
    .sell-item:active,.sell-item.selected{border-color:var(--gold);border-left-color:var(--gold)}
    .sell-item.si-carlos{border-left-color:var(--blue)}
    .sell-item.si-marta{border-left-color:var(--purple)}
    .sell-item .si-model{font-size:13px;font-weight:600;margin-bottom:4px}
    .sell-item .si-meta{font-size:11px;color:var(--text2)}
    .view-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px}
    .view-tab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .view-tab.active{background:var(--gold);color:#000}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
    .stat-card-header:active{opacity:.8}
    .stat-card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
    .stat-card-value{font-size:18px;font-weight:800;color:var(--gold2)}
    .stat-card-chevron{color:var(--text2);transition:transform .2s;flex-shrink:0}
    .stat-card.open .stat-card-chevron{transform:rotate(180deg)}
    .tog-chev{color:var(--text2);transition:transform .2s;display:inline-block;flex-shrink:0}
    .tog-chev.open{transform:rotate(180deg)}
    .stat-card-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
    .stat-card.open .stat-card-body{display:block}
    .range-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .range-label{font-size:11px;color:var(--text2);width:52px;flex-shrink:0}
    .range-bar-wrap{flex:1;background:var(--bg3);border-radius:3px;height:6px}
    .range-bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .4s}
    .range-count{font-size:11px;color:var(--text2);width:24px;text-align:right;flex-shrink:0}
    .aging-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .aging-green{background:var(--green)}.aging-yellow{background:#facc15}.aging-orange{background:var(--orange)}.aging-red{background:var(--red)}
    /* Bar chart */
    .bar-chart{display:flex;flex-direction:column;gap:6px;margin-top:8px}
    .bar-row{display:flex;align-items:center;gap:8px}
    .bar-label{font-size:10px;color:var(--text2);width:38px;flex-shrink:0;text-align:right}
    .bar-track{flex:1;background:var(--bg3);border-radius:3px;height:16px;position:relative;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s}
    .bar-val{font-size:10px;color:var(--text2);width:52px;flex-shrink:0;text-align:right}
    /* Sort row */
    .sort-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
    .sort-row::-webkit-scrollbar{display:none}
    .stab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer}
    .stab.active{background:var(--bg3);border-color:var(--gold);color:var(--gold)}
    /* Collapsible section in socios */
    .toggle-section{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:8px 0}
    .toggle-section-body{display:none}
    .toggle-section-body.open{display:block}
    /* Ventas filter row */
    .vfrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .vfrow select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;-webkit-appearance:none;cursor:pointer}
    /* Delete btn in movimientos */
    .mov-del{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;padding:4px 8px;border-radius:6px}
    .mov-del:active{color:var(--red)}
  </style>
</head>
<body>

<header>
  <div>
    <h1>⌚ WATCHES</h1>
    <span id="header-sub">Gestión de relojes</span>
  </div>
  <div style="text-align:right"><span id="sync-status">—</span></div>
</header>

<main>
  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div id="dash-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- STOCK -->
  <div class="view" id="view-stock">
    <div class="filter-tabs">
      <button class="ftab active" onclick="setStockFilter('todos',this)">Todos</button>
      <button class="ftab" onclick="setStockFilter('activo',this)">Comprado</button>
      <button class="ftab" onclick="setStockFilter('forwarded',this)">Forwarded</button>
      <button class="ftab" onclick="setStockFilter('publicado',this)">Publicado</button>
      <button class="ftab" onclick="setStockFilter('devuelto',this)">Devuelto</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <select id="stock-cuenta-filter" onchange="renderStock()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;-webkit-appearance:none;flex:1">
        <option value="">Cuenta: Todas</option>
        <option value="Carlos">Carlos</option>
        <option value="Marta">Marta</option>
      </select>
    </div>
    <div class="sort-row">
      <span style="font-size:11px;color:var(--text2);line-height:28px;flex-shrink:0">Ordenar:</span>
      <button class="stab active" id="ss-fecha" onclick="setStockSort('fecha',this)">Fecha</button>
      <button class="stab" id="ss-coste" onclick="setStockSort('coste',this)">Coste</button>
      <button class="stab" id="ss-dias" onclick="setStockSort('dias',this)">Días</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Buscar modelo..." id="stock-search" oninput="renderStock()">
    </div>
    <div id="stock-summary" style="margin-bottom:10px"></div>
    <div id="stock-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- VENTAS -->
  <div class="view" id="view-ventas">
    <button class="btn btn-green" style="margin-bottom:14px" onclick="openSellModal()">+ Registrar nueva venta</button>
    <!-- Filters -->
    <div class="vfrow">
      <select id="v-filter-mes" onchange="renderVentas()" style="flex:1">
        <option value="">Todos los meses</option>
      </select>
      <select id="v-filter-plat" onchange="renderVentas()" style="flex:1">
        <option value="">Todas las plataformas</option>
      </select>
    </div>
    <div id="ventas-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- ESTADÍSTICAS -->
  <div class="view" id="view-stats">
    <div id="stats-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- AÑADIR / EDITAR -->
  <div class="view" id="view-add">
    <div class="view-tabs">
      <button class="view-tab active" id="tab-nuevo" onclick="switchAddTab('nuevo')">+ Nuevo</button>
      <button class="view-tab" id="tab-editar" onclick="switchAddTab('editar')">✏️ Editar</button>
    </div>

    <!-- TAB NUEVO -->
    <div id="panel-nuevo">
      <form id="add-form" onsubmit="addWatch(event)">
        <div class="card">
          <div class="form-group">
            <label>Modelo *</label>
            <input type="text" name="modelo" placeholder="Ej: Omega Constellation Pie Pan" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Plataforma compra</label>
              <select name="plataforma_compra">
                <option value="">— Seleccionar —</option>
                <option>Chrono24</option><option>eBay</option><option>Vinted</option>
                <option>Catawiki</option><option>Reddit</option><option>Japón</option><option>Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Cuenta</label>
              <select name="cuenta">
                <option value="Carlos">Carlos</option>
                <option value="Marta">Marta</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Fecha compra</label>
            <input type="date" name="fecha_compra">
          </div>
        </div>
        <p class="sec-title">Costes (&pound;)</p>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label>Precio compra</label>
              <input type="number" name="precio_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
            <div class="form-group">
              <label>Gastos envío</label>
              <input type="number" name="gastos_envio_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Reparación</label>
              <input type="number" name="reparacion_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
            <div class="form-group">
              <label>Forwarder</label>
              <input type="number" name="gastos_forwarder_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text2)">
            Coste total: <strong id="coste-preview" style="color:var(--gold2)">&pound;0</strong>
          </div>
        </div>
        <p class="sec-title">Venta</p>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label>Precio listado</label>
              <input type="number" name="precio_listado_gbp" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Estado</label>
              <select name="estado">
                <option value="activo">Comprado</option>
                <option value="forwarded">Forwarded</option>
                <option value="publicado">Publicado</option>
                <option value="devuelto">Devuelto</option>
                <option value="vendido">Vendido</option>
              </select>
            </div>
          </div>
        </div>
        <p class="sec-title">Reparto beneficios (%)</p>
        <div class="card">
          <div class="form-row-3">
            <div class="form-group">
              <label>Carlos</label>
              <input type="number" name="pct_carlos" step="1" min="0" max="100" value="100" oninput="checkPct()">
            </div>
            <div class="form-group">
              <label>Marta</label>
              <input type="number" name="pct_marta" step="1" min="0" max="100" value="0" oninput="checkPct()">
            </div>
            <div class="form-group">
              <label>Dom</label>
              <input type="number" name="pct_dom" step="1" min="0" max="100" value="0" oninput="checkPct()">
            </div>
          </div>

/* ── HTTP helpers ── */
async function q(ep,opt={}){
  const {headers:optH={},...restOpt}=opt;
  const hh={...H,...optH};
  if(restOpt.method==='DELETE'||restOpt.method==='PATCH') delete hh['Prefer'];
  const r=await fetch(SURL+'/rest/v1/'+ep,{headers:hh,...restOpt});
  if(!r.ok){const e=await r.text();console.error('Supabase',r.status,ep,e);throw new Error(r.status+': '+e);}
  if(restOpt.method==='DELETE') return r;
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}
async function qPost(ep,body){
  const r=await fetch(SURL+'/rest/v1/'+ep,{headers:H,method:'POST',body:JSON.stringify(body)});
  if(!r.ok){const e=await r.text();console.error('POST',r.status,e);throw new Error(r.status+': '+e);}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

/* ── Load all ── */
async function loadAll(){
  try{
    [ops,socios,movs]=await Promise.all([
      q('operaciones?order=id.desc'),
      q('socios?order=capital_actual.desc'),
      q('movimientos?order=fecha.desc')

    renderDash(); renderStock(); renderVentas(); renderStats(); renderSocios();
    populateVentasFilters();

    document.getElementById('sync-status').textContent='Error';

}

  if(name==='add') fillCurrentPcts();

function fillCurrentPcts(){
  const capTotal=socios.reduce((s,o)=>s+(o.capital_actual||0),0);
  if(!capTotal||!socios.length) return;
  const get=n=>socios.find(s=>s.nombre===n);
  const pC=get('Carlos'),pM=get('Marta'),pD=get('Dom');
  const pc=pC?Math.round(pC.capital_actual/capTotal*100):0;
  const pm=pM?Math.round(pM.capital_actual/capTotal*100):0;
  const pd=pD?Math.round(pD.capital_actual/capTotal*100):0;
  const f=document.getElementById('add-form');
  if(!f) return;
  ['pct_carlos','pct_marta','pct_dom'].forEach((n,i)=>{
    const el=f.querySelector('[name='+n+']');
    if(el) el.value=[pc,pm,pd][i];

}

/* ── Helpers ── */
const fmt=n=>(n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD=n=>(n||0).toFixed(0);
const pct=n=>((n||0)*100).toFixed(2)+'%';
const pct2=n=>(n||0).toFixed(2)+'%';
const profCls=n=>n>=0?'p-pos':'p-neg';
const today=()=>new Date().toISOString().split('T')[0];
const daysDiff=(d1,d2)=>Math.round((new Date(d2)-new Date(d1))/(864e5));
const daysFromNow=d=>d?Math.round((new Date()-new Date(d))/(864e5)):0;

function estadoBadge(e){
  const m={'vendido':'b-green','publicado':'b-blue','activo':'b-gold','devuelto':'b-orange','forwarded':'b-teal'};
  return m[e]||'b-gold';
}
function estadoLabel(e){
  if(e==='activo') return 'Comprado';
  if(e==='vendido') return 'Vendido';
  if(e==='publicado') return 'Publicado';
  if(e==='devuelto') return 'Devuelto';
  if(e==='forwarded') return 'Forwarded';
  return e;
}
function cardClass(o){
  if(o.estado==='devuelto') return 'card-devuelto';
  if(o.estado==='forwarded') return 'card-forwarded';
  return 'card-'+(o.cuenta||'carlos').toLowerCase();
}
function cuentaBadge(c){
  return c==='Marta'?'c-marta':'c-carlos';
}
function reparto(o){
  const p=[];
  if(o.pct_carlos) p.push('C '+Math.round(o.pct_carlos*100)+'%');
  if(o.pct_marta)  p.push('M '+Math.round(o.pct_marta*100)+'%');
  if(o.pct_dom)    p.push('D '+Math.round(o.pct_dom*100)+'%');
  return p.join(' / ');
}
function agingClass(days){
  if(days<30) return 'aging-green';
  if(days<60) return 'aging-yellow';
  if(days<90) return 'aging-orange';
  return 'aging-red';
}

/* ── ESTADÍSTICAS ── */
function renderStats(){
  const vendidos=ops.filter(o=>o.estado==='vendido'&&o.ingreso_neto_gbp);
  const enstock=ops.filter(o=>['activo','forwarded','publicado','devuelto'].includes(o.estado));
  const todayD=new Date();

  if(!ops.length){
    document.getElementById('stats-content').innerHTML='<div class="empty"><div class="icon">📊</div><p>Sin datos todavía</p></div>';
    return;
  }

  // 1. Días por tramos
  const vendConDias=vendidos.filter(o=>o.dias_posesion!=null);
  const avgDias=vendConDias.length?vendConDias.reduce((s,o)=>s+(o.dias_posesion||0),0)/vendConDias.length:0;
  const ranges=[{l:'<15d',min:0,max:15},{l:'15-30d',min:15,max:30},{l:'30-60d',min:30,max:60},{l:'>60d',min:60,max:9999}];
  const rangeData=ranges.map(r=>{
    const grp=vendConDias.filter(o=>o.dias_posesion>=r.min&&o.dias_posesion<r.max);
    const avgBen=grp.length?grp.reduce((s,o)=>s+(o.beneficio_neto_gbp||0),0)/grp.length:0;
    return{...r,count:grp.length,avgBen};
  });
  const maxRange=Math.max(...rangeData.map(r=>r.count),1);

  // 2. ROI por plataforma compra
  const platCompraMap={};
  vendidos.forEach(o=>{
    const p=o.plataforma_compra||'Otro';
    if(!platCompraMap[p]) platCompraMap[p]={n:0,roi:0,ben:0};
    platCompraMap[p].n++;
    platCompraMap[p].roi+=(o.roi_pct||0);
    platCompraMap[p].ben+=(o.beneficio_neto_gbp||0);
  });
  const platCompraRows=Object.entries(platCompraMap).sort((a,b)=>b[1].ben-a[1].ben);

  // 3. Beneficio por mes — años disponibles
  const benAnios=[...new Set(vendidos.filter(o=>o.fecha_venta).map(o=>parseInt(o.fecha_venta.substring(0,4))))].sort().reverse();
  if(benAnios.length&&!benAnios.includes(benMesYear)) benMesYear=benAnios[0];

  // 4. Top 5 modelos rentables
  const modelMap={};
  vendidos.forEach(o=>{
    const m=o.modelo||'Desconocido';
    if(!modelMap[m]) modelMap[m]={n:0,ben:0,roi:0};
    modelMap[m].n++;
    modelMap[m].ben+=(o.beneficio_neto_gbp||0);
    modelMap[m].roi+=(o.roi_pct||0);
  });
  const top5=Object.entries(modelMap).sort((a,b)=>b[1].ben-a[1].ben).slice(0,5);
  const maxTop=Math.max(...top5.map(([,v])=>v.ben),1);

  // 5. Velocidad venta por plataforma+cuenta
  const platVentaMap={};
  vendidos.filter(o=>o.dias_posesion!=null).forEach(o=>{
    const p=o.plataforma_venta||'Otro';
    if(!platVentaMap[p]) platVentaMap[p]={n:0,dias:0,ben:0};
    platVentaMap[p].n++;
    platVentaMap[p].dias+=(o.dias_posesion||0);
    platVentaMap[p].ben+=(o.beneficio_neto_gbp||0);
  });
  const platVentaRows=Object.entries(platVentaMap).sort((a,b)=>b[1].n-a[1].n);

  // 6. Devoluciones
  const totalOps=ops.length;
  const numDev=ops.filter(o=>o.estado==='devuelto').length;
  const tasaDev=totalOps>0?numDev/totalOps*100:0;

  // 7. Capital en riesgo
  const capitalRiesgo=ops.filter(o=>['activo','forwarded','publicado'].includes(o.estado)).reduce((s,o)=>s+(o.coste_total_gbp||0),0);

  // 8. Stock aging
  const aging=ops.filter(o=>['activo','forwarded','publicado'].includes(o.estado)&&o.fecha_compra).map(o=>({...o,days:daysFromNow(o.fecha_compra)})).sort((a,b)=>b.days-a.days);

  document.getElementById('stats-content').innerHTML=`
    <p class="sec-title">Resumen global</p>
    <div class="stats" style="margin-bottom:14px">
      <div class="stat"><div class="lbl">Total ops</div><div class="val">${totalOps}</div><div class="sub">${vendidos.length} vendidas</div></div>
      <div class="stat"><div class="lbl">Capital riesgo</div><div class="val">&pound;${fmt(capitalRiesgo)}</div><div class="sub">comprado+listado</div></div>
      <div class="stat"><div class="lbl">Tasa devolución</div><div class="val">${tasaDev.toFixed(2)}%</div><div class="sub">${numDev} devueltos</div></div>
      <div class="stat"><div class="lbl">Días medio venta</div><div class="val">${avgDias.toFixed(0)}d</div><div class="sub">${vendConDias.length} ops</div></div>
    </div>

    <!-- Días por tramos -->
    <div class="stat-card" id="sc-dias">
      <div class="stat-card-header" onclick="toggleStat('sc-dias')">
        <div><div class="stat-card-title">Dias compra - venta (tramos)</div><div class="stat-card-value">${avgDias.toFixed(0)}d media</div></div>
        <svg class="stat-card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="stat-card-body">
        ${rangeData.map(r=>`
          <div class="range-row">
            <span class="range-label">${r.l}</span>
            <div class="range-bar-wrap"><div class="range-bar-fill" style="width:${Math.round(r.count/maxRange*100)}%"></div></div>
            <span class="range-count">${r.count}</span>
            <span style="font-size:11px;color:var(--text2);width:60px;text-align:right;flex-shrink:0">med.&pound;${fmt(r.avgBen)}</span>
          </div>`).join('')}
        <div style="font-size:11px;color:var(--text2);margin-top:6px">${vendConDias.length} relojes vendidos con fecha</div>
      </div>
    </div>

    <!-- ROI por plataforma compra -->
    <div class="stat-card" id="sc-platcompra">
      <div class="stat-card-header" onclick="toggleStat('sc-platcompra')">
        <div><div class="stat-card-title">ROI por plataforma de compra</div><div class="stat-card-value">${platCompraRows.length} plat.</div></div>
        <svg class="stat-card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="stat-card-body">
        <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:4px 10px;font-size:11px;margin-top:8px">
          <span style="color:var(--text2);font-weight:700">Plataforma</span>
          <span style="color:var(--text2);font-weight:700;text-align:center">Ops</span>
          <span style="color:var(--text2);font-weight:700;text-align:right">ROI med.</span>
          <span style="color:var(--text2);font-weight:700;text-align:right">Ben.</span>
          ${platCompraRows.map(([p,v])=>`
            <span>${p}</span>
            <span style="text-align:center;color:var(--gold2)">${v.n}</span>
            <span style="text-align:right;color:var(--green)">${pct(v.roi/v.n)}</span>
            <span style="text-align:right;color:var(--text)">&pound;${fmt(v.ben)}</span>`).join('')}
        </div>
      </div>
    </div>

    <!-- Beneficio por mes -->
    <div class="stat-card" id="sc-mesben">
      <div class="stat-card-header" onclick="toggleStat('sc-mesben')">
        <div><div class="stat-card-title">Beneficio por mes</div><div class="stat-card-value" id="ben-mes-title">${benMesYear}</div></div>
        <svg class="stat-card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="stat-card-body">
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
          ${benAnios.map(y=>`<button onclick="setBenMesYear(${y})" id="bmy-${y}" style="padding:4px 12px;border-radius:16px;border:1px solid ${y===benMesYear?'var(--gold)':'var(--border)'};background:${y===benMesYear?'var(--gold)':'transparent'};color:${y===benMesYear?'#000':'var(--text2)'};font-size:12px;font-weight:600;cursor:pointer">${y}</button>`).join('')}
        </div>
        <div class="bar-chart" id="ben-mes-chart"></div>
      </div>
    </div>

    <!-- Top 5 modelos -->
    <div class="stat-card" id="sc-top5">
      <div class="stat-card-header" onclick="toggleStat('sc-top5')">
        <div><div class="stat-card-title">Top 5 modelos rentables</div><div class="stat-card-value">${top5.length>0?top5[0][0].substring(0,18):'—'}</div></div>
        <svg class="stat-card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="stat-card-body">
        ${top5.map(([m,v],i)=>`
          <div style="padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:12px;font-weight:600">${i+1}. ${m.substring(0,32)}</span>
              <span class="p-pos" style="font-size:12px">&pound;${fmt(v.ben)}</span>
            </div>
            <div class="bar-track" style="height:8px"><div class="bar-fill" style="width:${Math.round(v.ben/maxTop*100)}%"></div></div>
            <div style="font-size:10px;color:var(--text2);margin-top:3px">${v.n} venta${v.n!==1?'s':''} · ROI med. ${pct(v.roi/v.n)}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Velocidad por plataforma venta -->
    <div class="stat-card" id="sc-platventa">
      <div class="stat-card-header" onclick="toggleStat('sc-platventa')">
        <div><div class="stat-card-title">Velocidad por plataforma venta</div><div class="stat-card-value">${platVentaRows.length} plat.</div></div>
        <svg class="stat-card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="stat-card-body">
        <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:4px 10px;font-size:11px;margin-top:8px">
          <span style="color:var(--text2);font-weight:700">Plataforma</span>
          <span style="color:var(--text2);font-weight:700;text-align:center">Ventas</span>
          <span style="color:var(--text2);font-weight:700;text-align:right">dias med.</span>
          <span style="color:var(--text2);font-weight:700;text-align:right">Beneficio</span>
          ${platVentaRows.map(([p,v])=>`
            <span>${p}</span>
            <span style="text-align:center;color:var(--gold2)">${v.n}</span>
            <span style="text-align:right;color:var(--text2)">${(v.dias/v.n).toFixed(0)}d med.</span>
            <span style="text-align:right" class="${profCls(v.ben)}">&pound;${fmt(v.ben)}</span>`).join('')}
        </div>
      </div>
    </div>

    <!-- Stock por antigüedad -->
    <div class="stat-card" id="sc-aging">
      <div class="stat-card-header" onclick="toggleStat('sc-aging')">
        <div><div class="stat-card-title">Stock por antigüedad</div><div class="stat-card-value">${aging.length} relojes</div></div>
        <svg class="stat-card-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="stat-card-body">
        ${aging.map(o=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
            <span class="aging-dot ${agingClass(o.days)}"></span>
            <span style="flex:1;font-size:12px">${o.modelo.substring(0,28)}</span>
            <span class="badge ${estadoBadge(o.estado)}" style="font-size:9px">${estadoLabel(o.estado)}</span>
            <span style="font-size:12px;color:var(--text2)">${o.days}d</span>
          </div>`).join('')}
        <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text2)">
          <span><span class="aging-dot aging-green" style="display:inline-block;margin-right:3px"></span>&lt;30d</span>
          <span><span class="aging-dot aging-yellow" style="display:inline-block;margin-right:3px"></span>30-60d</span>
          <span><span class="aging-dot aging-orange" style="display:inline-block;margin-right:3px"></span>60-90d</span>
          <span><span class="aging-dot aging-red" style="display:inline-block;margin-right:3px"></span>&gt;90d</span>
        </div>
      </div>
    </div>`;
  // Render the monthly chart after DOM is ready
  setTimeout(()=>setBenMesYear(benMesYear),0);
}

function toggleStat(id){
  document.getElementById(id)?.classList.toggle('open');
}

function setBenMesYear(y){
  benMesYear=y;
  const vendidos=ops.filter(o=>o.estado==='vendido'&&o.ingreso_neto_gbp);
  const meses=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const benMes={};
  meses.forEach(m=>{benMes[y+'-'+m]=0;});
  vendidos.filter(o=>o.fecha_venta&&o.fecha_venta.startsWith(y+'')).forEach(o=>{
    const m=o.fecha_venta.substring(0,7);
    if(benMes.hasOwnProperty(m)) benMes[m]+=(o.beneficio_neto_gbp||0);
  });
  const rows=Object.entries(benMes);
  const maxB=Math.max(...rows.map(([,v])=>Math.abs(v)),1);
  const chart=document.getElementById('ben-mes-chart');
  if(chart) chart.innerHTML=rows.map(([m,v])=>`
    <div class="bar-row">
      <span class="bar-label">${m.substring(5)}'${m.substring(2,4)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(Math.abs(v)/maxB*100)}%;background:${v>0?'linear-gradient(90deg,var(--gold),var(--gold2))':'linear-gradient(90deg,var(--red),#fca5a5)'}"></div></div>
      <span class="bar-val ${profCls(v)}">&pound;${fmt(v)}</span>
    </div>`).join('');
  const title=document.getElementById('ben-mes-title');
  if(title) title.textContent=y;
  // Update year buttons style
  document.querySelectorAll('[id^="bmy-"]').forEach(btn=>{
    const active=btn.id==='bmy-'+y;
    btn.style.borderColor=active?'var(--gold)':'var(--border)';
    btn.style.background=active?'var(--gold)':'transparent';
    btn.style.color=active?'#000':'var(--text2)';
  });
}

/* ── SOCIOS ── */
function renderSocios(){
  const vendidos=ops.filter(o=>o.estado==='vendido'&&o.ingreso_neto_gbp);
  const enstock=ops.filter(o=>['activo','forwarded','publicado'].includes(o.estado));
  const capTotal=socios.reduce((s,o)=>s+(o.capital_actual||0),0);
  const dynPct=s=>capTotal>0?s.capital_actual/capTotal*100:0;

  const benOps={Carlos:0,Marta:0,Dom:0};
  vendidos.forEach(o=>{
    benOps.Carlos+=(o.beneficio_carlos||0);
    benOps.Marta+=(o.beneficio_marta||0);
    benOps.Dom+=(o.beneficio_dom||0);
  });

  // Beneficio no realizado (en stock, usando valor negativo guardado vs coste)
  const benNoReal={Carlos:0,Marta:0,Dom:0};
  enstock.forEach(o=>{
    benNoReal.Carlos-=(o.coste_total_gbp||0)*(o.pct_carlos||0);
    benNoReal.Marta-=(o.coste_total_gbp||0)*(o.pct_marta||0);
    benNoReal.Dom-=(o.coste_total_gbp||0)*(o.pct_dom||0);
  });

  const aport={Carlos:0,Marta:0,Dom:0};
  movs.forEach(m=>{
    if(aport.hasOwnProperty(m.socio)){
      if(m.tipo==='Aportación') aport[m.socio]+=(m.importe||0);
      if(m.tipo==='Retirada') aport[m.socio]-=Math.abs(m.importe||0);
    }
  });

  document.getElementById('socios-content').innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="sum-row"><span class="k">Capital total</span><span class="v">&pound;${fmt(capTotal)}</span></div>
      <div class="sum-row"><span class="k">Operaciones vendidas</span><span class="v">${vendidos.length}</span></div>
    </div>
    ${socios.map(s=>{
      const pctDyn=dynPct(s);
      const ben=s.beneficio_total||benOps[s.nombre]||0;
      const ap=aport[s.nombre]||0;
      const roi=ap>0?ben/ap:0;
      const noReal=benNoReal[s.nombre]||0;
      // Movimientos de este socio
      const misMovs=movs.filter(m=>m.socio===s.nombre).slice(0,8);
      const socioMovsId='sm-'+s.nombre;
      return `
      <div class="socio-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="name">${s.nombre}</div>
          <span class="badge ${cuentaBadge(s.nombre)}">${pctDyn.toFixed(2)}%</span>
        </div>
        <div class="sum-row"><span class="k">Capital actual</span><span class="v">&pound;${fmt(s.capital_actual)}</span></div>
        <div class="sum-row"><span class="k">Aportaciones netas</span><span class="v">&pound;${fmt(ap)}</span></div>
        <div class="sum-row"><span class="k">Beneficio realizado</span><span class="v ${profCls(ben)}">&pound;${fmt(ben)}</span></div>
        <div class="sum-row"><span class="k">Capital en stock</span><span class="v" style="color:var(--text2)">&pound;${fmt(Math.abs(noReal))}</span></div>
        <div class="sum-row"><span class="k">ROI realizado</span><span class="v ${profCls(roi)}">${(roi*100).toFixed(2)}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(Math.max(pctDyn,0),100)}%"></div></div>
        ${misMovs.length?`
        <div class="toggle-section" onclick="toggleMovs('${socioMovsId}')">
          <span style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.7px">Movimientos (${misMovs.length})</span>
          <svg class="tog-chev" id="${socioMovsId}-chev" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="toggle-section-body" id="${socioMovsId}">
          ${misMovs.map(m=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-size:12px;font-weight:600">${m.tipo}</div>
                <div style="font-size:10px;color:var(--text2)">${m.fecha}${m.notas?' · '+m.notas:''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="${m.tipo==='Retirada'||m.tipo==='Pérdida'?'p-neg':'p-pos'}" style="font-size:13px">
                  ${m.tipo==='Retirada'||m.tipo==='Pérdida'?'-':'+'}&pound;${fmt(Math.abs(m.importe))}
                </span>
                <button class="mov-del" onclick="deleteMov(${m.id},event)" title="Eliminar">✕</button>
              </div>
            </div>`).join('')}
        </div>`:''}
      </div>`;
    }).join('')}
    <div style="margin:16px 0 10px">
      <button class="btn btn-gold" onclick="openAportacionModal()">+ Nueva aportación / retirada</button>
    </div>`;
}

function toggleMovs(id){
  const body=document.getElementById(id);
  const chev=document.getElementById(id+'-chev');
  if(!body) return;
  const open=body.classList.toggle('open');
  if(chev) chev.classList.toggle('open', open);
}

    body.beneficio_neto_gbp=parseFloat(beneficio.toFixed(2));
    body.roi_pct=parseFloat(roi.toFixed(4));

    body.beneficio_marta=parseFloat((beneficio*(o.pct_marta||0)).toFixed(2));

/* ── updateSociosCapital ── */
async function updateSociosCapital(benMap){
  const fresh=await q('socios?order=nombre');
  const newCaps={};
  fresh.forEach(s=>{
    const b=benMap[s.nombre]||0;
    newCaps[s.nombre]={capital_actual:+(s.capital_actual+b).toFixed(2),beneficio_total:+(s.beneficio_total+b).toFixed(2)};
  });
  const total=Object.values(newCaps).reduce((s,v)=>s+v.capital_actual,0);
  await Promise.all(fresh.map(s=>{
    const vals={...newCaps[s.nombre],porcentaje_actual:total>0?+(newCaps[s.nombre].capital_actual/total*100).toFixed(4):0};
    return q('socios?nombre=eq.'+encodeURIComponent(s.nombre),{method:'PATCH',body:JSON.stringify(vals)});
  }));
}

async function saveAportacion(){
  const socio=document.getElementById('ap-socio')?.value;
  const importe=parseFloat(document.getElementById('ap-importe')?.value)||0;
  const fecha=document.getElementById('ap-fecha')?.value;
  const tipo=document.getElementById('ap-tipo')?.value||'Aportación';
  const notas=document.getElementById('ap-notas')?.value||null;
  if(!importe||!fecha){showToast('⚠️ Rellena importe y fecha');return;}
  const importeSigno=tipo==='Retirada'?-Math.abs(importe):Math.abs(importe);
  showSaving();
  try{
    await qPost('movimientos',{fecha,tipo,socio,importe:importeSigno,notas});
    if(tipo==='Aportación'||tipo==='Retirada'){
      const s=socios.find(x=>x.nombre===socio);
      if(s){
        const newCap=+(s.capital_actual+importeSigno).toFixed(2);
        // Actualizar capital del socio y recalcular porcentajes en paralelo
        const tempSocios=socios.map(x=>x.nombre===socio?{...x,capital_actual:newCap}:x);
        const total=tempSocios.reduce((acc,x)=>acc+(x.capital_actual||0),0);
        await Promise.all(tempSocios.map(x=>{
          const patch=x.nombre===socio
            ?{capital_actual:newCap,porcentaje_actual:total>0?+(newCap/total*100).toFixed(4):0}
            :{porcentaje_actual:total>0?+(x.capital_actual/total*100).toFixed(4):0};
          return q('socios?nombre=eq.'+encodeURIComponent(x.nombre),{method:'PATCH',body:JSON.stringify(patch)});
        }));
      }
    }
    document.getElementById('aport-overlay').classList.remove('open');
    await loadAll();
    showToast('✅ '+tipo+' — &pound;'+fmt(Math.abs(importe)));
  }catch(e){showToast('❌ Error al guardar: '+e.message,true);}
}

async function addWatch(e){
  e.preventDefault();
  const btn=document.getElementById('add-btn');
  btn.textContent='Guardando...';btn.disabled=true;
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd);
  const precio=parseFloat(d.precio_gbp)||0;
  const envio=parseFloat(d.gastos_envio_gbp)||0;
  const rep=parseFloat(d.reparacion_gbp)||0;
  const fwd=parseFloat(d.gastos_forwarder_gbp)||0;
  const coste=+(precio+envio+rep+fwd).toFixed(2);
  const pC=(parseFloat(d.pct_carlos)||0)/100;
  const pM=(parseFloat(d.pct_marta)||0)/100;
  const pD=(parseFloat(d.pct_dom)||0)/100;
  const body={
    modelo:d.modelo.trim(),
    plataforma_compra:d.plataforma_compra||null,
    fecha_compra:d.fecha_compra||null,
    precio_gbp:precio,gastos_envio_gbp:envio,reparacion_gbp:rep,gastos_forwarder_gbp:fwd,
    coste_total_gbp:coste,
    precio_listado_gbp:parseFloat(d.precio_listado_gbp)||0,
    pct_carlos:pC,pct_marta:pM,pct_dom:pD,
    beneficio_neto_gbp:-coste,roi_pct:-1,
    beneficio_carlos:+(-coste*pC).toFixed(2),
    beneficio_marta:+(-coste*pM).toFixed(2),
    beneficio_dom:+(-coste*pD).toFixed(2),
    estado:d.estado||'activo',
    cuenta:d.cuenta||'Carlos',
    notas:d.notas||null
  };
  // Auto-transición: Comprado → Forwarded si hay coste de forwarder
  if(body.estado==='activo'&&fwd>0) body.estado='forwarded';
  showSaving();
  try{
    await qPost('operaciones',body);
    await loadAll();
    showToast('✅ Reloj añadido');
    e.target.reset();
    ['pct_carlos','pct_marta','pct_dom'].forEach((n,i)=>{
      const el=e.target.querySelector('[name='+n+']');
      if(el) el.value=i===0?100:0;
    });
    document.getElementById('coste-preview').textContent='£0';
    showView('stock',document.querySelectorAll('nav button')[1]);
  }catch(er){showToast('❌ Error al guardar: '+er.message,true);}
  btn.textContent='Añadir reloj';btn.disabled=false;
}

/* ── EDIT TABS ── */
function switchAddTab(tab){
  document.getElementById('tab-nuevo').classList.toggle('active',tab==='nuevo');
  document.getElementById('tab-editar').classList.toggle('active',tab==='editar');
  document.getElementById('panel-nuevo').style.display=tab==='nuevo'?'block':'none';
  document.getElementById('panel-editar').style.display=tab==='editar'?'block':'none';
  if(tab==='editar') renderEditList();
}

function renderEditList(){
  const sq=(document.getElementById('edit-search')?.value||'').toLowerCase();
  // Show ALL watches (including vendido/devuelto) for editing
  const list=ops.filter(o=>(o.modelo||'').toLowerCase().includes(sq));
  document.getElementById('edit-list').innerHTML=list.length
    ?list.map(o=>`
      <div class="sell-item si-${(o.cuenta||'carlos').toLowerCase()}" onclick="loadEditForm(${o.id})">
        <div class="si-model">${o.modelo}</div>
        <div class="si-meta">
          <span class="badge ${cuentaBadge(o.cuenta)}">${o.cuenta||'—'}</span>
          <span class="badge ${estadoBadge(o.estado)}">${estadoLabel(o.estado)}</span>
          &pound;${fmt(o.coste_total_gbp)} · ${o.fecha_compra||''}
        </div>
      </div>`).join('')
    :'<div class="empty"><p>Sin relojes</p></div>';
  document.getElementById('edit-form-wrap').style.display='none';
}

function loadEditForm(id){
  const o=ops.find(x=>x.id===id);
  if(!o) return;
  const wrap=document.getElementById('edit-form-wrap');
  wrap.style.display='block';
  wrap.innerHTML=`
    <div class="divider"></div>
    <p class="sec-title">Editando: ${o.modelo}</p>
    <div class="card">
      <div class="form-group"><label>Modelo</label>
        <input type="text" id="ef-modelo" value="${(o.modelo||'').replace(/"/g,'&quot;')}">
      </div>
      <div class="form-row">
        <div class="form-group"><label>Plataforma compra</label>
          <select id="ef-plataforma">
            ${['','Chrono24','eBay','Vinted','Catawiki','Reddit','Japón','Otro'].map(p=>`<option${(o.plataforma_compra||'')===(p)||o.plataforma_compra===p?' selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Cuenta</label>
          <select id="ef-cuenta">
            <option${o.cuenta==='Carlos'?' selected':''}>Carlos</option>
            <option${o.cuenta==='Marta'?' selected':''}>Marta</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Fecha compra</label>
        <input type="date" id="ef-fecha" value="${o.fecha_compra||''}">
      </div>
    </div>
    <p class="sec-title">Costes (&pound;)</p>
    <div class="card">
      <div class="form-row">
        <div class="form-group"><label>Precio compra</label>
          <input type="number" id="ef-precio" step="0.01" value="${o.precio_gbp||0}" oninput="calcEditCoste()">
        </div>
        <div class="form-group"><label>Gastos envío</label>
          <input type="number" id="ef-envio" step="0.01" value="${o.gastos_envio_gbp||0}" oninput="calcEditCoste()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Reparación</label>
          <input type="number" id="ef-rep" step="0.01" value="${o.reparacion_gbp||0}" oninput="calcEditCoste()">
        </div>
        <div class="form-group"><label>Forwarder</label>
          <input type="number" id="ef-fwd" step="0.01" value="${o.gastos_forwarder_gbp||0}" oninput="calcEditCoste()">
        </div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text2)">
        Coste total: <strong id="ef-coste" style="color:var(--gold2)">&pound;${fmt(o.coste_total_gbp)}</strong>
      </div>
    </div>
    <p class="sec-title">Estado y venta</p>
    <div class="card">
      <div class="form-row">
        <div class="form-group"><label>Precio listado</label>
          <input type="number" id="ef-listado" step="0.01" value="${o.precio_listado_gbp||0}">
        </div>
        <div class="form-group"><label>Estado</label>
          <select id="ef-estado" onchange="onEditEstadoChange(${id})">
            ${[['activo','Comprado'],['forwarded','Forwarded'],['publicado','Publicado'],['devuelto','Devuelto'],['vendido','Vendido']].map(([v,l])=>`<option value="${v}"${o.estado===v?' selected':''}>${l}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label>Fecha publicación</label>
        <input type="date" id="ef-fpub" value="${o.fecha_publicacion||''}">
      </div>
      <!-- Venta fields (shown when vendido) -->
      <div id="ef-venta-fields" style="${o.estado==='vendido'?'':'display:none'}">
        <div class="form-row">
          <div class="form-group"><label>Ingreso neto (&pound;)</label>
            <input type="number" id="ef-ingreso" step="0.01" value="${o.ingreso_neto_gbp||0}">
          </div>
          <div class="form-group"><label>Fecha venta</label>
            <input type="date" id="ef-fventa" value="${o.fecha_venta||''}">
          </div>
        </div>
        <div class="form-group"><label>Plataforma venta</label>
          <select id="ef-platventa">
            ${['','Chrono24','eBay','Vinted','Catawiki','Reddit','Otro'].map(p=>`<option${(o.plataforma_venta||'')===p?' selected':''}>${p}</option>`).join('')}
          </select>
        </div>
      </div>
      <!-- Devuelto fields -->
      <div id="ef-dev-fields" style="${o.estado==='devuelto'?'':'display:none'}">
        <div class="form-row">
          <div class="form-group"><label>Reembolso (&pound;)</label>
            <input type="number" id="ef-reembolso" step="0.01" value="${o.importe_reembolso||0}">
          </div>
          <div class="form-group"><label>Gastos retorno (&pound;)</label>
            <input type="number" id="ef-gastos-ret" step="0.01" value="${o.gastos_retorno||0}">
          </div>
        </div>
      </div>
    </div>
    <p class="sec-title">Reparto (%)</p>
    <div class="card">
      <div class="form-row-3">
        <div class="form-group"><label>Carlos</label>
          <input type="number" id="ef-pc" step="1" min="0" max="100" value="${Math.round((o.pct_carlos||0)*100)}">
        </div>
        <div class="form-group"><label>Marta</label>
          <input type="number" id="ef-pm" step="1" min="0" max="100" value="${Math.round((o.pct_marta||0)*100)}">
        </div>
        <div class="form-group"><label>Dom</label>
          <input type="number" id="ef-pd" step="1" min="0" max="100" value="${Math.round((o.pct_dom||0)*100)}">
        </div>
      </div>
    </div>
    <div class="form-group">
      <textarea id="ef-notas" rows="2" style="resize:none;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;outline:none">${o.notas||''}</textarea>
    </div>
    <button class="btn btn-gold" onclick="saveEdit(${id})">Guardar cambios</button>
    <div style="height:8px"></div>
    <button class="btn btn-red" onclick="deleteWatch(${id})">Eliminar reloj</button>
    <div style="height:10px"></div>`;
  wrap.scrollIntoView({behavior:'smooth'});
}

function onEditEstadoChange(id){
  const estado=document.getElementById('ef-estado')?.value;
  const fpub=document.getElementById('ef-fpub');
  if((estado==='publicado')&&fpub&&!fpub.value) fpub.value=today();
  const ventaFields=document.getElementById('ef-venta-fields');
  const devFields=document.getElementById('ef-dev-fields');
  if(ventaFields) ventaFields.style.display=estado==='vendido'?'block':'none';
  if(devFields) devFields.style.display=estado==='devuelto'?'block':'none';
}

function calcEditCoste(){
  const c=['ef-precio','ef-envio','ef-rep','ef-fwd']
    .reduce((s,i)=>s+(parseFloat(document.getElementById(i)?.value)||0),0);
  const el=document.getElementById('ef-coste');
  if(el) el.textContent='£'+fmt(c);
}

async function saveEdit(id){
  const o=ops.find(x=>x.id===id);
  const precio=parseFloat(document.getElementById('ef-precio')?.value)||0;
  const envio=parseFloat(document.getElementById('ef-envio')?.value)||0;
  const rep=parseFloat(document.getElementById('ef-rep')?.value)||0;
  const fwd=parseFloat(document.getElementById('ef-fwd')?.value)||0;
  const coste=+(precio+envio+rep+fwd).toFixed(2);
  const pC=(parseFloat(document.getElementById('ef-pc')?.value)||0)/100;
  const pM=(parseFloat(document.getElementById('ef-pm')?.value)||0)/100;
  const pD=(parseFloat(document.getElementById('ef-pd')?.value)||0)/100;
  const cuenta=document.getElementById('ef-cuenta')?.value||'Carlos';
  const plat=document.getElementById('ef-plataforma')?.value||null;
  const estado=document.getElementById('ef-estado')?.value||o.estado;

  let body={
    modelo:document.getElementById('ef-modelo')?.value||o.modelo,
    plataforma_compra:plat||null,
    cuenta,
    fecha_compra:document.getElementById('ef-fecha')?.value||null,
    precio_gbp:precio,gastos_envio_gbp:envio,reparacion_gbp:rep,
    gastos_forwarder_gbp:fwd,coste_total_gbp:coste,
    precio_listado_gbp:parseFloat(document.getElementById('ef-listado')?.value)||0,
    fecha_publicacion:document.getElementById('ef-fpub')?.value||null,
    estado,pct_carlos:pC,pct_marta:pM,pct_dom:pD,
    notas:document.getElementById('ef-notas')?.value||null
  };

  if(estado==='vendido'){
    const ingreso=parseFloat(document.getElementById('ef-ingreso')?.value)||0;
    const fventa=document.getElementById('ef-fventa')?.value||null;
    const platventa=document.getElementById('ef-platventa')?.value||null;
    const beneficio=ingreso-coste;
    const roi=coste?beneficio/coste:0;
    const diasPos=body.fecha_compra&&fventa?daysDiff(body.fecha_compra,fventa):null;
    body={...body,ingreso_neto_gbp:ingreso,beneficio_neto_gbp:+beneficio.toFixed(2),
      roi_pct:+roi.toFixed(4),dias_posesion:diasPos,fecha_venta:fventa,plataforma_venta:platventa,
      beneficio_carlos:+(beneficio*pC).toFixed(2),beneficio_marta:+(beneficio*pM).toFixed(2),
      beneficio_dom:+(beneficio*pD).toFixed(2)};
  } else if(estado==='devuelto'){
    const reembolso=parseFloat(document.getElementById('ef-reembolso')?.value)||0;
    const gastosRet=parseFloat(document.getElementById('ef-gastos-ret')?.value)||0;
    const resultado=reembolso-coste-gastosRet;
    body={...body,importe_reembolso:reembolso,gastos_retorno:gastosRet,
      beneficio_neto_gbp:+resultado.toFixed(2),roi_pct:coste?+(resultado/coste).toFixed(4):0,
      beneficio_carlos:+(resultado*pC).toFixed(2),beneficio_marta:+(resultado*pM).toFixed(2),
      beneficio_dom:+(resultado*pD).toFixed(2)};
  } else {
    body={...body,beneficio_neto_gbp:-coste,
      beneficio_carlos:+(-coste*pC).toFixed(2),beneficio_marta:+(-coste*pM).toFixed(2),
      beneficio_dom:+(-coste*pD).toFixed(2)};
    // Auto-transición: Comprado → Forwarded si hay coste de forwarder
    if(body.estado==='activo'&&fwd>0) body.estado='forwarded';
  }

  showSaving();
  try{
    await q('operaciones?id=eq.'+id,{method:'PATCH',body:JSON.stringify(body)});
    await loadAll();
    showToast('✅ Reloj actualizado');
    document.getElementById('edit-form-wrap').style.display='none';
    renderEditList();
  }catch(e){showToast('❌ Error al guardar: '+e.message,true);}
}

/* ── DELETE WATCH ── */
async function deleteWatch(id){
  if(!confirm('¿Eliminar este reloj? Esta acción no se puede deshacer.')) return;
  try{
    await q('operaciones?id=eq.'+id,{method:'DELETE'});
    document.getElementById('detail-overlay').classList.remove('open');
    await loadAll();
    showToast('🗑️ Reloj eliminado');
  }catch(e){showToast('❌ '+e.message.substring(0,60));}
}

/* ── DELETE MOVIMIENTO ── */
async function deleteMov(id,evt){
  evt.stopPropagation();
  if(!confirm('¿Eliminar este movimiento?')) return;
  try{
    await q('movimientos?id=eq.'+id,{method:'DELETE'});
    await loadAll();
    showToast('🗑️ Movimiento eliminado');
  }catch(e){showToast('❌ '+e.message.substring(0,60));}
}

/* ── MODAL CLOSE ── */
function closeOverlay(id,e){
  if(e.target.id===id) document.getElementById(id).classList.remove('open');
}

/* ── TOAST & SAVING ── */
let _savingTimer=null;
function showSaving(){
  const t=document.getElementById('toast');
  if(_savingTimer){clearTimeout(_savingTimer);_savingTimer=null;}
  t.innerHTML='<span style="opacity:.7">⏳</span> Guardando...';
  t.style.borderColor='var(--gold)';
  t.classList.add('show');
}
function hideSaving(){
  const t=document.getElementById('toast');
  t.style.borderColor='';
  t.classList.remove('show');
}
function showToast(msg,isError){
  const t=document.getElementById('toast');
  if(_savingTimer) clearTimeout(_savingTimer);
  t.style.borderColor=isError?'var(--red)':'';
  t.innerHTML=msg;t.classList.add('show');
  _savingTimer=setTimeout(()=>{t.classList.remove('show');t.style.borderColor='';},3500);
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  loadAll();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
});
</script>
</body>
</html>
