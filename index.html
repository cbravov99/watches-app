<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Watches">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Watches</title>
  <style>
    :root {
      --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --border:#2a2a2a;
      --gold:#c9a84c; --gold2:#e8c97a; --text:#f0f0f0; --text2:#888;
      --green:#4ade80; --red:#f87171; --blue:#60a5fa; --purple:#c084fc;
      --nav-h:68px; --safe-bot:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px 10px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:19px;font-weight:700;letter-spacing:1.5px;color:var(--gold)}
    #header-sub{font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}
    #sync-status{font-size:11px;color:var(--text2)}

    /* MAIN */
    main{padding:16px 14px;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 20px);max-width:600px;margin:0 auto}

    /* VIEWS */
    .view{display:none;animation:fadeIn .18s ease}
    .view.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

    /* BOTTOM NAV */
    nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(12,12,12,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot)}
    nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text2);transition:color .15s;font-size:10px;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
    nav button.active{color:var(--gold)}
    nav button svg{width:21px;height:21px}

    /* CARDS */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
    .card-sm{padding:12px}

    /* STATS GRID */
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
    .stat .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
    .stat .val{font-size:21px;font-weight:700;color:var(--gold2)}
    .stat .sub{font-size:11px;color:var(--text2);margin-top:2px}

    /* SECTION TITLE */
    .sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;margin-top:2px}

    /* BADGES */
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px}
    .b-green{background:rgba(74,222,128,.15);color:var(--green)}
    .b-gold{background:rgba(201,168,76,.15);color:var(--gold2)}
    .b-blue{background:rgba(96,165,250,.15);color:var(--blue)}
    .b-red{background:rgba(248,113,113,.15);color:var(--red)}
    .b-purple{background:rgba(192,132,252,.15);color:var(--purple)}
    .b-orange{background:rgba(251,146,60,.18);color:#fb923c}
    /* Devuelto card highlight */
    .watch-card.card-devuelto{border-left:4px solid #fb923c;opacity:.85}
    /* Cuenta badges */
    .c-carlos{background:rgba(96,165,250,.18);color:var(--blue);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
    .c-marta{background:rgba(192,132,252,.18);color:var(--purple);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}

    /* WATCH CARD */
    .watch-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;border-left:4px solid var(--border)}
    .watch-card:active{border-color:var(--gold)}
    .watch-card.card-carlos{border-left:4px solid var(--blue)}
    .watch-card.card-marta{border-left:4px solid var(--purple)}
    .watch-card .model{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.3}
    .watch-card .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .watch-card .price{font-size:17px;font-weight:700;color:var(--gold2)}
    .watch-card .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--text2)}
    /* Cuenta label prominent */
    .cuenta-label{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px}
    .cuenta-carlos{background:rgba(96,165,250,.2);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
    .cuenta-marta{background:rgba(192,132,252,.2);color:var(--purple);border:1px solid rgba(192,132,252,.3)}

    /* PROFIT */
    .p-pos{color:var(--green);font-weight:700}
    .p-neg{color:var(--red);font-weight:700}

    /* FORM */
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;outline:none;transition:border-color .15s;-webkit-appearance:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
    .form-group select option{background:var(--bg3)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

    /* BUTTONS */
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;-webkit-appearance:none}
    .btn:active{opacity:.7}
    .btn-gold{background:var(--gold);color:#000}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .btn-green{background:rgba(74,222,128,.2);color:var(--green);border:1px solid rgba(74,222,128,.3)}
    .btn-sm{width:auto;padding:7px 16px;font-size:13px;border-radius:9px}

    /* SOCIO CARD */
    .socio-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px}
    .socio-card .name{font-size:16px;font-weight:700;margin-bottom:10px}
    .sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
    .sum-row:last-child{border-bottom:none}
    .sum-row .k{font-size:12px;color:var(--text2)}
    .sum-row .v{font-size:13px;font-weight:700}
    .progress-bar{height:5px;background:var(--bg3);border-radius:3px;margin-top:10px}
    .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s}

    /* LOADING */
    .loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* EMPTY */
    .empty{text-align:center;padding:36px 16px;color:var(--text2)}
    .empty .icon{font-size:36px;margin-bottom:8px}

    /* DIVIDER */
    .divider{height:1px;background:var(--border);margin:12px 0}

    /* TOAST */
    #toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bot) + 14px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
    #toast.show{opacity:1}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto}
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal h2{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--gold2)}
    .modal-close{float:right;background:var(--bg3);border:none;color:var(--text2);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px}

    /* FILTER TABS */
    .filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
    .filter-tabs::-webkit-scrollbar{display:none}
    .ftab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .ftab.active{background:var(--gold);border-color:var(--gold);color:#000}

    /* SEARCH */
    .search-wrap{position:relative;margin-bottom:12px}
    .search-wrap input{padding-left:38px}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2)}

    /* SELL / EDIT SELECT LIST */
    .sell-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;border-left:3px solid var(--border)}
    .sell-item:active,.sell-item.selected{border-color:var(--gold);border-left-color:var(--gold)}
    .sell-item.si-carlos{border-left-color:var(--blue)}
    .sell-item.si-marta{border-left-color:var(--purple)}
    .sell-item .si-model{font-size:13px;font-weight:600;margin-bottom:4px}
    .sell-item .si-meta{font-size:11px;color:var(--text2)}
    /* ADD/EDIT TABS */
    .view-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px}
    .view-tab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .view-tab.active{background:var(--gold);color:#000}
    /* COLLAPSIBLE STAT CARD */
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
    .stat-card-header:active{opacity:.8}
    .stat-card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
    .stat-card-value{font-size:18px;font-weight:800;color:var(--gold2)}
    .stat-card-chevron{color:var(--text2);font-size:16px;transition:transform .2s}
    .stat-card.open .stat-card-chevron{transform:rotate(180deg)}
    .stat-card-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
    .stat-card.open .stat-card-body{display:block}
    /* RANGE BAR */
    .range-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .range-label{font-size:11px;color:var(--text2);width:52px;flex-shrink:0}
    .range-bar-wrap{flex:1;background:var(--bg3);border-radius:3px;height:6px}
    .range-bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .4s}
    .range-count{font-size:11px;color:var(--text2);width:24px;text-align:right;flex-shrink:0}
    /* AGING DOT */
    .aging-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .aging-green{background:var(--green)}.aging-yellow{background:#facc15}.aging-red{background:var(--red)}
  </style>
</head>
<body>

<header>
  <div>
    <h1>⌚ WATCHES</h1>
    <span id="header-sub">Gestión de relojes</span>
  </div>
  <div style="text-align:right"><span id="sync-status">—</span></div>
</header>

<main>
  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div id="dash-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- STOCK -->
  <div class="view" id="view-stock">
    <div class="filter-tabs">
      <button class="ftab active" onclick="setStockFilter('activo,listado,reservado',this)">En stock</button>
      <button class="ftab" onclick="setStockFilter('activo',this)">Activo</button>
      <button class="ftab" onclick="setStockFilter('listado',this)">Listado</button>
      <button class="ftab" onclick="setStockFilter('reservado',this)">Reservado</button>
      <button class="ftab" onclick="setStockFilter('devuelto',this)" style="color:#fb923c">Devueltos</button>
      <button class="ftab" onclick="setStockFilter('todos',this)">Todos</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Buscar modelo..." id="stock-search" oninput="renderStock()">
    </div>
    <div id="stock-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- VENTAS -->
  <div class="view" id="view-ventas">
    <button class="btn btn-green" style="margin-bottom:14px" onclick="openSellModal()">
      + Registrar nueva venta
    </button>
    <div id="ventas-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>

  <!-- AÑADIR / EDITAR -->
  <div class="view" id="view-add">
    <div class="view-tabs">
      <button class="view-tab active" id="tab-nuevo" onclick="switchAddTab('nuevo')">+ Nuevo reloj</button>
      <button class="view-tab" id="tab-editar" onclick="switchAddTab('editar')">✏️ Editar reloj</button>
    </div>

    <!-- TAB NUEVO -->
    <div id="panel-nuevo">
      <form id="add-form" onsubmit="addWatch(event)">
        <div class="card">
          <div class="form-group">
            <label>Modelo *</label>
            <input type="text" name="modelo" placeholder="Ej: Omega Constellation Pie Pan" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Plataforma compra</label>
              <select name="plataforma_compra">
                <option value="">— Seleccionar —</option>
                <option>Chrono24</option>
                <option>eBay</option>
                <option>Vinted</option>
                <option>Catawiki</option>
                <option>Reddit</option>
                <option>Japón</option>
                <option>Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Cuenta</label>
              <select name="cuenta">
                <option value="Carlos">Carlos</option>
                <option value="Marta">Marta</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Fecha compra</label>
            <input type="date" name="fecha_compra">
          </div>
        </div>
        <p class="sec-title">Costes (£)</p>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label>Precio compra</label>
              <input type="number" name="precio_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
            <div class="form-group">
              <label>Gastos envío</label>
              <input type="number" name="gastos_envio_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Reparación</label>
              <input type="number" name="reparacion_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
            <div class="form-group">
              <label>Forwarder</label>
              <input type="number" name="gastos_forwarder_gbp" step="0.01" placeholder="0.00" oninput="calcCoste()">
            </div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text2)">
            Coste total: <strong id="coste-preview" style="color:var(--gold2)">£0</strong>
          </div>
        </div>
        <p class="sec-title">Venta</p>
        <div class="card">
          <div class="form-row">
            <div class="form-group">
              <label>Precio listado</label>
              <input type="number" name="precio_listado_gbp" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
              <label>Estado</label>
              <select name="estado">
                <option value="activo">Activo</option>
                <option value="listado">Listado</option>
                <option value="reservado">Reservado</option>
              </select>
            </div>
          </div>
        </div>
        <p class="sec-title">Reparto beneficios (%)</p>
        <div class="card">
          <div class="form-row-3">
            <div class="form-group">
              <label>Carlos</label>
              <input type="number" name="pct_carlos" step="1" min="0" max="100" value="100" oninput="checkPct()">
            </div>
            <div class="form-group">
              <label>Marta</label>
              <input type="number" name="pct_marta" step="1" min="0" max="100" value="0" oninput="checkPct()">
            </div>
            <div class="form-group">
              <label>Dom</label>
              <input type="number" name="pct_dom" step="1" min="0" max="100" value="0" oninput="checkPct()">
            </div>
          </div>
          <div id="pct-warn" style="font-size:11px;color:var(--red);display:none">⚠ Los % deben sumar 100</div>
        </div>
        <div class="form-group">
          <textarea name="notas" placeholder="Notas..." rows="2" style="resize:none"></textarea>
        </div>
        <button type="submit" class="btn btn-gold" id="add-btn">Añadir reloj</button>
      </form>
    </div>

    <!-- TAB EDITAR -->
    <div id="panel-editar" style="display:none">
      <div class="search-wrap" style="margin-bottom:10px">
        <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Buscar reloj a editar..." id="edit-search" oninput="renderEditList()">
      </div>
      <div id="edit-list"></div>
      <div id="edit-form-wrap" style="display:none"></div>
    </div>
  </div>

  <!-- SOCIOS -->
  <div class="view" id="view-socios">
    <div id="socios-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>
</main>

<!-- BOTTOM NAV -->
<nav>
  <button class="active" onclick="showView('dashboard',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Dashboard
  </button>
  <button onclick="showView('stock',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/><path d="M12 5V3M12 21v-2M5 12H3M21 12h-2"/></svg>
    Stock
  </button>
  <button onclick="showView('ventas',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Ventas
  </button>
  <button onclick="showView('add',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    Añadir
  </button>
  <button onclick="showView('socios',this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Socios
  </button>
</nav>

<div id="toast"></div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay" onclick="closeOverlay('detail-overlay',event)">
  <div class="modal" id="detail-content"></div>
</div>

<!-- SELL MODAL -->
<div class="modal-overlay" id="sell-overlay" onclick="closeOverlay('sell-overlay',event)">
  <div class="modal" id="sell-content"></div>
</div>

<!-- APORTACIÓN MODAL -->
<div class="modal-overlay" id="aport-overlay" onclick="closeOverlay('aport-overlay',event)">
  <div class="modal" id="aport-content"></div>
</div>

<script>

async function q(ep,opt={}){
  // Destructure headers from opt to prevent ...opt from overwriting merged headers
  const {headers:optH={}, ...restOpt}=opt;
  const hNoPref={...H,...optH};
  // For DELETE and simple PATCH we don't need Prefer:return=representation
  if(restOpt.method==='DELETE'||restOpt.method==='PATCH') delete hNoPref['Prefer'];
  const r=await fetch(SURL+'/rest/v1/'+ep,{headers:hNoPref,...restOpt});
  if(!r.ok){
    const e=await r.text();
    console.error('Supabase error',r.status,ep,e);
    throw new Error(r.status+': '+e);
  }
  if(restOpt.method==='DELETE') return r;
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

// POST always needs Prefer:return=representation to get back the created row
async function qPost(ep,body){
  const r=await fetch(SURL+'/rest/v1/'+ep,{
    headers:H, method:'POST', body:JSON.stringify(body)
  });
  if(!r.ok){const e=await r.text();console.error('POST error',r.status,e);throw new Error(r.status+': '+e);}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){

    [ops,socios,movs]=await Promise.all([
      q('operaciones?order=id.desc'),

    ]);

    renderDash(); renderStock(); renderVentas(); renderSocios();

    console.error(e);
  }
}

/* Rellena los % del formulario con los porcentajes actuales calculados desde capital */
function fillCurrentPcts(){
  const capTotal=socios.reduce((s,o)=>s+(o.capital_actual||0),0);
  if(!capTotal||!socios.length) return;
  const get=(n)=>socios.find(s=>s.nombre===n);
  const pC=get('Carlos'), pM=get('Marta'), pD=get('Dom');
  const pc=pC?Math.round(pC.capital_actual/capTotal*100):0;
  const pm=pM?Math.round(pM.capital_actual/capTotal*100):0;
  const pd=pD?Math.round(pD.capital_actual/capTotal*100):0;
  const f=document.getElementById('add-form');
  if(!f) return;
  const pcE=f.querySelector('[name=pct_carlos]');
  const pmE=f.querySelector('[name=pct_marta]');
  const pdE=f.querySelector('[name=pct_dom]');
  if(pcE) pcE.value=pc;
  if(pmE) pmE.value=pm;
  if(pdE) pdE.value=pd;
}

/* ── HELPERS ── */
const fmt=n=>(n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD=n=>(n||0).toFixed(0);
const pct=n=>((n||0)*100).toFixed(1)+'%';
const pct2=n=>(n||0).toFixed(1)+'%';
const profCls=n=>n>=0?'p-pos':'p-neg';

function estadoBadge(e){
  const m={'vendido':'b-green','listado':'b-blue','reservado':'b-purple','activo':'b-gold','devuelto':'b-orange'};

}
function cardClass(o){
  if(o.estado==='devuelto') return 'card-devuelto';
  return 'card-'+(o.cuenta||'carlos').toLowerCase();
}
function cuentaBadge(c){
  return c==='Marta'?'c-marta':'c-carlos';
}
function reparto(o){
  const p=[];
  if(o.pct_carlos)p.push('C '+Math.round(o.pct_carlos*100)+'%');
  if(o.pct_marta)p.push('M '+Math.round(o.pct_marta*100)+'%');
  if(o.pct_dom)p.push('D '+Math.round(o.pct_dom*100)+'%');
  return p.join(' / ');
}

/* ── SOCIOS ── */
function renderSocios(){
  const vendidos=ops.filter(o=>o.estado==='vendido'&&o.ingreso_neto_gbp!=null);
  const capTotal=socios.reduce((s,o)=>s+(o.capital_actual||0),0);

  // Porcentajes dinámicos calculados desde capital actual
  const dynPct=(s)=>capTotal>0?s.capital_actual/capTotal*100:0;

  // Beneficio acumulado desde operaciones vendidas
  const benOps={Carlos:0,Marta:0,Dom:0};
  vendidos.forEach(o=>{
    benOps.Carlos+=(o.beneficio_carlos||0);
    benOps.Marta+=(o.beneficio_marta||0);
    benOps.Dom+=(o.beneficio_dom||0);
  });

  // Aportaciones netas (aportaciones - retiradas)
  const aport={Carlos:0,Marta:0,Dom:0};
  movs.forEach(m=>{
    if(aport.hasOwnProperty(m.socio)){
      if(m.tipo==='Aportación') aport[m.socio]+=(m.importe||0);
      if(m.tipo==='Retirada') aport[m.socio]-=Math.abs(m.importe||0);
    }
  });

  const recentMovs=movs.slice(0,20);

  document.getElementById('socios-content').innerHTML=`

      const ben=s.beneficio_total||benOps[s.nombre]||0;

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="name">${s.nombre}</div>
          <span class="badge ${cuentaBadge(s.nombre)}">${pctDyn.toFixed(1)}%</span>
        </div>
        <div class="sum-row"><span class="k">Capital actual</span><span class="v">£${fmt(s.capital_actual)}</span></div>
        <div class="sum-row"><span class="k">Aportaciones netas</span><span class="v">£${fmt(ap)}</span></div>
        <div class="sum-row"><span class="k">Beneficio acumulado</span><span class="v ${profCls(ben)}">£${fmt(ben)}</span></div>
        <div class="sum-row"><span class="k">ROI</span><span class="v ${profCls(roi)}">${(roi*100).toFixed(1)}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(Math.max(pctDyn,0),100)}%"></div></div>
      </div>`}).join('')}
    <div style="margin:16px 0 10px">
      <button class="btn btn-gold" onclick="openAportacionModal()">+ Nueva aportación</button>
    </div>
    <p class="sec-title" style="margin-top:4px">Movimientos recientes</p>
    ${recentMovs.map(m=>`
      <div class="card card-sm" style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600;font-size:13px">${m.tipo} — ${m.socio}</div>
            <div style="font-size:11px;color:var(--text2)">${m.fecha}${m.notas?' · '+m.notas:''}</div>
          </div>
          <div class="${m.tipo==='Retirada'||m.tipo==='Pérdida'?'p-neg':'p-pos'}" style="font-size:14px">
            ${m.tipo==='Retirada'||m.tipo==='Pérdida'?'-':'+'}£${fmt(Math.abs(m.importe))}

async function confirmSell(id){
  const o=ops.find(x=>x.id===id);
  const precio=parseFloat(document.getElementById('sell-precio')?.value)||0;
  if(!precio){showToast('⚠️ Introduce el precio recibido');return;}
  const fecha=document.getElementById('sell-fecha')?.value||new Date().toISOString().split('T')[0];
  const plataforma=document.getElementById('sell-plataforma')?.value||null;
  const coste=o.coste_total_gbp||0;
  const beneficio=precio-coste;
  const roi=coste?beneficio/coste:0;
  const diasPos=o.fecha_compra?Math.round((new Date(fecha)-new Date(o.fecha_compra))/(864e5)):null;

  const body={
    estado:'vendido', fecha_venta:fecha, ingreso_neto_gbp:precio,
    beneficio_neto_gbp:parseFloat(beneficio.toFixed(2)),
    roi_pct:parseFloat(roi.toFixed(4)),
    dias_posesion:diasPos, plataforma_venta:plataforma,
    beneficio_carlos:parseFloat((beneficio*(o.pct_carlos||1)).toFixed(2)),
    beneficio_marta:parseFloat((beneficio*(o.pct_marta||0)).toFixed(2)),
    beneficio_dom:parseFloat((beneficio*(o.pct_dom||0)).toFixed(2))
  };

  try{
    await q('operaciones?id=eq.'+id,{method:'PATCH',body:JSON.stringify(body)});
    // Actualizar capital de cada socio
    await updateSociosCapital({
      Carlos: body.beneficio_carlos||0,
      Marta:  body.beneficio_marta||0,
      Dom:    body.beneficio_dom||0
    });
    document.getElementById('sell-overlay').classList.remove('open');
    await loadAll();
    showToast('✅ Venta registrada — Beneficio £'+fmt(beneficio));
  }catch(e){
    console.error('confirmSell error:',e);
    showToast('❌ '+e.message.substring(0,60));
  }
}

/* Suma beneficios a socios y recalcula porcentajes */
async function updateSociosCapital(benMap){
  // Leer socios frescos
  const fresh=await q('socios?order=nombre');
  const newCaps={};
  fresh.forEach(s=>{
    const b=benMap[s.nombre]||0;
    newCaps[s.nombre]={
      capital_actual:+(s.capital_actual+b).toFixed(2),
      beneficio_total:+(s.beneficio_total+b).toFixed(2)
    };
  });
  const total=Object.values(newCaps).reduce((s,v)=>s+v.capital_actual,0);
  await Promise.all(fresh.map(s=>{
    const vals={...newCaps[s.nombre], porcentaje_actual:total>0?+(newCaps[s.nombre].capital_actual/total*100).toFixed(4):0};
    return q('socios?nombre=eq.'+encodeURIComponent(s.nombre),{method:'PATCH',body:JSON.stringify(vals)});
  }));
}

async function saveAportacion(){
  const socio=document.getElementById('ap-socio')?.value;
  const importe=parseFloat(document.getElementById('ap-importe')?.value)||0;
  const fecha=document.getElementById('ap-fecha')?.value;
  const tipo=document.getElementById('ap-tipo')?.value||'Aportación';
  const notas=document.getElementById('ap-notas')?.value||null;
  if(!importe||!fecha){showToast('⚠️ Rellena importe y fecha');return;}

  const importeSigno=tipo==='Retirada'?-Math.abs(importe):Math.abs(importe);

  try{
    // INSERT movimiento
    await qPost('movimientos',{fecha,tipo,socio,importe:importeSigno,notas});
    // PATCH socio capital (solo para aportaciones y retiradas, no beneficios manuales)
    if(tipo==='Aportación'||tipo==='Retirada'){
      const s=socios.find(x=>x.nombre===socio);
      if(s){
        const newCap=+(s.capital_actual+importeSigno).toFixed(2);
        await q('socios?nombre=eq.'+encodeURIComponent(socio),{method:'PATCH',body:JSON.stringify({capital_actual:newCap})});
        // Recalcular porcentajes
        const fresh=await q('socios?order=nombre');
        const total=fresh.reduce((s,x)=>s+(x.capital_actual||0),0);
        await Promise.all(fresh.map(x=>
          q('socios?nombre=eq.'+encodeURIComponent(x.nombre),{method:'PATCH',body:JSON.stringify({
            porcentaje_actual:total>0?+(x.capital_actual/total*100).toFixed(4):0
          })})
        ));
      }
    }
    document.getElementById('aport-overlay').classList.remove('open');
    await loadAll();
    showToast('✅ '+tipo+' registrada — £'+fmt(Math.abs(importe)));
  }catch(e){
    console.error('saveAportacion error:',e);
    showToast('❌ '+e.message.substring(0,60));
  }
}

async function addWatch(e){
  e.preventDefault();
  const btn=document.getElementById('add-btn');
  btn.textContent='Guardando...';btn.disabled=true;
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd);
  const precio=parseFloat(d.precio_gbp)||0;
  const envio=parseFloat(d.gastos_envio_gbp)||0;
  const rep=parseFloat(d.reparacion_gbp)||0;
  const fwd=parseFloat(d.gastos_forwarder_gbp)||0;
  const coste=+(precio+envio+rep+fwd).toFixed(2);
  const pC=(parseFloat(d.pct_carlos)||0)/100;
  const pM=(parseFloat(d.pct_marta)||0)/100;
  const pD=(parseFloat(d.pct_dom)||0)/100;
  const plat=d.plataforma_compra
    ? d.plataforma_compra+' '+(d.cuenta||'Carlos')
    : (d.cuenta||'Carlos');
  const body={
    modelo:d.modelo.trim(),
    plataforma_compra:plat.trim(),
    fecha_compra:d.fecha_compra||null,
    precio_gbp:precio,
    gastos_envio_gbp:envio,
    reparacion_gbp:rep,
    gastos_forwarder_gbp:fwd,
    coste_total_gbp:coste,
    precio_listado_gbp:parseFloat(d.precio_listado_gbp)||0,
    pct_carlos:pC, pct_marta:pM, pct_dom:pD,
    beneficio_neto_gbp:-coste,
    roi_pct:-1,
    beneficio_carlos:+(-coste*pC).toFixed(2),
    beneficio_marta:+(-coste*pM).toFixed(2),
    beneficio_dom:+(-coste*pD).toFixed(2),
    estado:d.estado||'activo',
    cuenta:d.cuenta||'Carlos',
    notas:d.notas||null
  };
  try{
    const res=await qPost('operaciones',body);
    // Reload fresh from DB to confirm save
    await loadAll();
    showToast('✅ Reloj añadido correctamente');
    e.target.reset();
    e.target.querySelector('[name=pct_carlos]').value='100';
    e.target.querySelector('[name=pct_marta]').value='0';
    e.target.querySelector('[name=pct_dom]').value='0';
    document.getElementById('coste-preview').textContent='£0';
    // Switch to stock to show the new watch
    showView('stock', document.querySelectorAll('nav button')[1]);
  }catch(er){
    console.error('addWatch error:',er);
    showToast('❌ '+er.message.substring(0,60));
  }
  btn.textContent='Añadir reloj';btn.disabled=false;
}

/* ── STATS SECTION ── */
function renderStatsSection(){
  const vendidos=ops.filter(o=>o.estado==='vendido'&&o.dias_posesion!=null&&o.ingreso_neto_gbp!=null);
  const enstock=ops.filter(o=>o.estado!=='vendido'&&o.fecha_compra);
  const today=new Date();

  if(!vendidos.length&&!enstock.length) return '';

  // 1. Tiempo medio compra→venta
  const avgDias=vendidos.length?vendidos.reduce((s,o)=>s+(o.dias_posesion||0),0)/vendidos.length:0;
  const ranges=[{l:'<15d',min:0,max:15},{l:'15-30d',min:15,max:30},{l:'30-60d',min:30,max:60},{l:'>60d',min:60,max:9999}];
  const rangeCounts=ranges.map(r=>vendidos.filter(o=>o.dias_posesion>=r.min&&o.dias_posesion<r.max).length);
  const maxRange=Math.max(...rangeCounts,1);

  // 2. Velocidad por plataforma
  const platMap={};
  vendidos.forEach(o=>{
    const p=o.plataforma_venta||'Otro';
    if(!platMap[p]) platMap[p]={n:0,dias:0};
    platMap[p].n++;platMap[p].dias+=(o.dias_posesion||0);
  });
  const platRows=Object.entries(platMap).sort((a,b)=>b[1].n-a[1].n);

  // 3. Tiempo publicación→venta
  const conPub=vendidos.filter(o=>o.fecha_publicacion&&o.fecha_venta);
  const avgPub=conPub.length?conPub.reduce((s,o)=>{
    const d=Math.round((new Date(o.fecha_venta)-new Date(o.fecha_publicacion))/(864e5));
    return s+d;
  },0)/conPub.length:0;

  // 4. Stock aging
  const aging=enstock.map(o=>{
    const d=Math.round((today-new Date(o.fecha_compra))/(864e5));
    return {...o,daysInStock:d};
  }).sort((a,b)=>b.daysInStock-a.daysInStock);

  return `
  <p class="sec-title" style="margin-top:18px">Estadísticas de tiempo</p>

  <div class="stat-card" id="sc-1">
    <div class="stat-card-header" onclick="toggleStat('sc-1')">
      <div><div class="stat-card-title">Tiempo compra → venta</div><div class="stat-card-value">${avgDias.toFixed(0)}d media</div></div>
      <span class="stat-card-chevron">▾</span>
    </div>
    <div class="stat-card-body">
      ${ranges.map((r,i)=>`
        <div class="range-row">
          <span class="range-label">${r.l}</span>
          <div class="range-bar-wrap"><div class="range-bar-fill" style="width:${Math.round(rangeCounts[i]/maxRange*100)}%"></div></div>
          <span class="range-count">${rangeCounts[i]}</span>
        </div>`).join('')}
      <div style="font-size:11px;color:var(--text2);margin-top:6px">${vendidos.length} relojes vendidos</div>
    </div>
  </div>

  <div class="stat-card" id="sc-2">
    <div class="stat-card-header" onclick="toggleStat('sc-2')">
      <div><div class="stat-card-title">Velocidad por plataforma</div><div class="stat-card-value">${platRows.length} plataformas</div></div>
      <span class="stat-card-chevron">▾</span>
    </div>
    <div class="stat-card-body">
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:4px 12px;font-size:12px;margin-top:6px">
        <span style="color:var(--text2);font-weight:700">Plataforma</span><span style="color:var(--text2);font-weight:700;text-align:center">Ventas</span><span style="color:var(--text2);font-weight:700;text-align:right">Media</span>
        ${platRows.map(([p,v])=>`
          <span>${p}</span>
          <span style="text-align:center;color:var(--gold2)">${v.n}</span>
          <span style="text-align:right;color:var(--text2)">${(v.dias/v.n).toFixed(0)}d</span>`).join('')}
      </div>
    </div>
  </div>

  <div class="stat-card" id="sc-3">
    <div class="stat-card-header" onclick="toggleStat('sc-3')">
      <div><div class="stat-card-title">Publicación → venta</div><div class="stat-card-value">${avgPub.toFixed(0)}d media</div></div>
      <span class="stat-card-chevron">▾</span>
    </div>
    <div class="stat-card-body">
      <div style="font-size:12px;color:var(--text2);margin-top:6px">${conPub.length} relojes con fecha de publicación registrada</div>
      ${conPub.slice(0,5).map(o=>{
        const d=Math.round((new Date(o.fecha_venta)-new Date(o.fecha_publicacion))/(864e5));
        return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text2)">${o.modelo.substring(0,28)}</span><span>${d}d</span></div>`;
      }).join('')}
    </div>
  </div>

  <div class="stat-card" id="sc-4">
    <div class="stat-card-header" onclick="toggleStat('sc-4')">
      <div><div class="stat-card-title">Stock por antigüedad</div><div class="stat-card-value">${aging.length} relojes</div></div>
      <span class="stat-card-chevron">▾</span>
    </div>
    <div class="stat-card-body">
      ${aging.map(o=>{
        const cls=o.daysInStock<30?'aging-green':o.daysInStock<60?'aging-yellow':'aging-red';
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <span class="aging-dot ${cls}"></span>
          <span style="flex:1;font-size:12px">${o.modelo.substring(0,30)}</span>
          <span style="font-size:12px;color:var(--text2)">${o.daysInStock}d</span>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text2)">
        <span><span class="aging-dot aging-green" style="display:inline-block;margin-right:3px"></span>&lt;30d</span>
        <span><span class="aging-dot aging-yellow" style="display:inline-block;margin-right:3px"></span>30-60d</span>
        <span><span class="aging-dot aging-red" style="display:inline-block;margin-right:3px"></span>&gt;60d</span>
      </div>
    </div>
  </div>`;
}

function toggleStat(id){
  document.getElementById(id)?.classList.toggle('open');
}

/* ── DELETE ── */
async function deleteWatch(id){
  if(!confirm('¿Eliminar este reloj?'))return;
  try{
    await q('operaciones?id=eq.'+id,{method:'DELETE'});
    document.getElementById('detail-overlay').classList.remove('open');
    await loadAll();
    showToast('🗑️ Eliminado');
  }catch(e){
    console.error('deleteWatch error:',e);
    showToast('❌ '+e.message.substring(0,60));
  }
}

/* ── MODAL CLOSE ── */
function closeOverlay(id,e){
  if(e.target.id===id)document.getElementById(id).classList.remove('open');
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  loadAll();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
});
</script>
</body>
</html>
